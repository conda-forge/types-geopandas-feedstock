{% set version = "1.1.3.20260508" %}

package:
  name: types-geopandas
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/t/types-geopandas/types_geopandas-{{ version }}.tar.gz
  sha256: bf3cdf7dcfbadb69d344b6a2f8280fab364b18b146d6fd37d47b8255ee02c0c2

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}.*
    - setuptools >=77.0.3
    - pip
  run:
    - python >={{ python_min }}
    - types-shapely
    - numpy >=1.20
    - pandas-stubs
    - pyproj

test:
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}.*

about:
  home: https://github.com/python/typeshed
  summary: Typing stubs for geopandas
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - p-vdp
